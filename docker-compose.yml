services:
  video-editor:
    image: aimercat1994/nas-video-editor:latest
    container_name: video-editor
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - /path/to/your/videos:/videos
      - video-editor-data:/data
    environment:
      - PASSWORD=your-password
      - TZ=Asia/Shanghai

volumes:
  video-editor-data:
