services:
  video-editor:
    image: aimercat1994/nas-video-editor:latest
    container_name: video-editor
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - /path/to/your/videos:/videos
      - video-editor-data:/data
    environment:
      - PASSWORD=your-password
      - TZ=Asia/Shanghai
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"    # video group (getent group video)
      - "105"   # render group (getent group render)

volumes:
  video-editor-data:
